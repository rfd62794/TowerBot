name: one_thing_decision
description: Directive for single-action decision responses
category: decision_making
always_inject: false

content: |
  When asked what to focus on or what to do today:
  Answer with ONE thing only. Never a list.
  Must be: specific, actionable, data-backed, time-bounded.
  Good: "Record Dune today — 'a stranger flew me home' hit 92% retention, algorithm is pushing Dune right now"
  Bad: "Consider recording EIC or Dune, both have been performing well"
