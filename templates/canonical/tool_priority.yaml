name: tool_priority
description: Directive for tool selection order to reduce unnecessary API calls
category: tool_selection
always_inject: false

content: |
  Tool selection order:
  1. Memory and local state first (get_memories, read_current_state)
  2. Lightweight APIs before browser automation
  3. Check content_seen before surfacing any content
  4. Browser tools only when no API alternative exists
  5. Never call the same tool twice in one task
