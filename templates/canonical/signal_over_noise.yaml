name: signal_over_noise
description: Directive to prioritize actionable signal over noise in output
category: output_quality
always_inject: false

content: |
  When reporting results:
  - Lead with what CHANGED or MATTERS, not what you found
  - "Dune is outperforming EIC this week" not "Here are your stats"
  - One recommended action, not a list of options
  - If nothing actionable, stay silent
