# Provider priority by task type
# Defines which models to use for different types of work
# Note: Ollama models >4GB (7B, 8B) restricted to nighttime (8PM-8AM) by OllamaSwapManager

# Autonomous tasks (background, overnight, scheduled)
autonomous:
  priority:
    - model: "ollama/gemma3:4b"
      provider: "ollama"
      reason: "Local, free, unlimited, lightweight (2.5GB), daytime-safe"
    - model: "ollama/qwen2.5:3b"
      provider: "ollama"
      reason: "Local, good tool calling, daytime backup (2GB)"
    - model: "groq/llama-3.3-70b-versatile"
      provider: "groq"
      reason: "14,400/day, fast"
    - model: "openrouter/free"
      provider: "openrouter"
      reason: "Pool of free models"
    - model: "deepseek/deepseek-v4-flash:free"
      provider: "openrouter"
      reason: "Paid fallback, budget cap"

# User conversations (real-time, interactive)
conversation:
  priority:
    - model: "ollama/qwen2.5:7b"
      provider: "ollama"
      reason: "Local, better reasoning, nighttime only (4GB)"
    - model: "ollama/gemma3:4b"
      provider: "ollama"
      reason: "Local, lightweight, daytime-safe (2.5GB)"
    - model: "groq/llama-3.3-70b-versatile"
      provider: "groq"
      reason: "Fastest response"
    - model: "google/gemini-2.0-flash"
      provider: "google"
      reason: "Best tool calling quality"
    - model: "openrouter/free"
      provider: "openrouter"
      reason: "Pool of free models"
    - model: "deepseek/deepseek-v4-flash:free"
      provider: "openrouter"
      reason: "Paid fallback, budget cap"

