# Task instances — schedule and filled-in parameters only

email_triage:
  template: inbox_scan
  schedule: {type: interval, minutes: 120}
  enabled: true

itch_reddit_check:
  template: reddit_monitor
  schedule: {type: interval, minutes: 60}
  enabled: true
  params:
    keywords: [VoidDrift]
    subreddits: [r/incremental_games, r/gamedev]
    hours: 24

nightly_snapshot:
  template: metric_snapshot
  schedule: {type: cron, hour: 22, minute: 30}
  enabled: true
  params:
    data_sources: [youtube, itch]
    label: "Daily metrics"

openagent_momentum_tracker:
  template: pypi_monitor
  schedule: {type: cron, hour: 8, minute: 0}
  enabled: true
  params:
    package: openagent-directive
    baseline_key: openagent_pypi_baseline
    label: "OpenAgent stats"

self_expansion_planner:
  template: self_expand
  schedule: {type: cron, hour: 7, minute: 0}
  enabled: true
  params:
    focus: "next phase"

blog_structure_generator:
  template: blog_scaffold
  schedule: {type: cron, hour: 1, minute: 0, day_of_week: 6}
  enabled: true

community_opportunity_scout:
  template: community_scout
  schedule: {type: interval, minutes: 60}
  enabled: true

comment_new_videos:
  schedule: {type: cron, hour: 10, minute: 0}
  enabled: true  # Manual test passed, OAuth scope verified
  description: "Post template comment on videos published in last 25 hours"

# --- DECISION PROMPTS ---
content_decision_prompt:
  template: content_decision_prompt
  schedule: {type: cron, hour: 9, minute: 0}
  enabled: true
  description: "Analyze recent commits and YouTube performance, surface one recording recommendation"

# --- FOLLOW-UP ENFORCEMENT ---
debt_followup:
  template: debt_followup
  schedule: {type: cron, hour: 10, minute: 0, day_of_week: 1,3,5}
  enabled: true
  description: "Surface open debt items, stalled projects, and pending tasks that have gone quiet"

# --- OPPORTUNITY CAPTURE ---
opportunity_capture:
  template: opportunity_capture
  schedule: {type: interval, minutes: 60}
  enabled: true
  description: "Find Reddit and HN threads where VoidDrift, OpenAgent, or Bevy expertise adds value"

# --- LEARNING PIPELINE ---
tech_digest:
  template: tech_digest
  schedule: {type: cron, hour: 7, minute: 30}
  enabled: true
  description: "3 items from Bevy, Rust, and indie game dev worth knowing today"

# --- CONTENT GAP DETECTION ---
content_gap_detector:
  template: content_gap_detector
  schedule: {type: cron, hour: 18, minute: 0}
  enabled: true
  description: "Find commits or game milestones from the last 48 hours with no corresponding YouTube Short"

# --- WEEKLY ACCOUNTABILITY ---
weekly_accountability:
  template: weekly_accountability
  schedule: {type: cron, hour: 8, minute: 0, day_of_week: 1}
  enabled: true
  description: "Numbers vs goals for last week — commits, Shorts, blog posts, itch.io sessions"

# --- HACKER NEWS MONITOR ---
hn_monitor:
  schedule: cron
  cron: "0 */2 * * *"    # Every 2 hours
  enabled: true
  description: "Watch HN for Rust game dev, Bevy, idle games, or Python CLI posts >50 points. Deduplicate via content_seen."

# --- SELF-IMPROVEMENT ---
skill_review:
  schedule: cron
  cron: "0 6 * * 0"    # Sunday 6AM
  enabled: true
  description: "Analyze last 7 days of agent_actions. Propose improvements, new templates, and drops."

# --- PROFILE HEALTH CHECK ---
profile_health_check:
  schedule: cron
  cron: "0 9 * * 1"    # Monday 9AM
  enabled: true
  description: "Check all Playwright browser profiles are still valid, notify if expired"

# --- WEEKLY FINDS DIGEST ---
weekly_finds:
  schedule: cron
  cron: "0 7 * * 0"    # Sunday 7AM (before skill_review at 6AM runs first)
  enabled: true
  description: "Digest of the week's most interesting research findings from all background tasks"

# --- DEEP DIVE (MANUAL) ---
deep_dive:
  schedule: manual
  enabled: true
  description: "On-demand deep dive into a specific topic — triggered by self-direction loop via Google Task"
