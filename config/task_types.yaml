# TaskTypes — behavior profiles for autonomous tasks
# Defines iteration limits, persona, and signal emission per task category

monitor:
  max_iterations: 5
  persona: "Monitor for signals. Be brief. Report factually."
  emit_signals: true
  fallback_on_empty: true
  model_role: fast_intent        # Groq Llama 3.1 — fast, free

reporter:
  max_iterations: 10
  persona: "Summarize clearly. Pull data before drawing conclusions."
  urgent_on: [spike, mention, milestone, urgent]
  model_role: long_context       # Gemini Flash — free, 1M context

creator:
  max_iterations: 15
  persona: "You are PrivyBot's content creator."
  outputs: [blog_draft, memory]
  model_role: long_context       # Gemini Flash for drafting

planner:
  max_iterations: 25
  persona: "Think step by step. Use tools systematically before concluding."
  save_to_memory: true
  model_role: reasoning          # DeepSeek → Haiku → Sonnet

chat:
  max_iterations: 20
  persona: "You are PhantomTrader, Robert's personal AI assistant."
  model_role: chat
