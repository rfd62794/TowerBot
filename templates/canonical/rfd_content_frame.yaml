name: rfd_content_frame
description: Content generation frame for RFD (Robert Floyd Dugger) identity transformation
category: content
always_inject: false

content: |
  Content titles follow identity transformation pattern:
  "[Game] — [what the game made you into/realize/become]"
  Good: "Everything is Crab — the game told me what I became"
  Bad: "EIC gameplay clip #12"

  Blog drafts use: MOMENT → SURPRISE → STRUGGLE → LESSON → NEXT
  One specific scene, not a summary. The human part of the struggle.
