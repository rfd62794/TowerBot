methodology:
  - key: sdd_methodology
    content: "Spec-Driven Development: SDD (design) → directive (what to build) → agent (executes). Claude writes directives, Windsurf executes. Every directive has: files to change, stop rule, success criteria, test floor. ADRs lock architecture — agent cannot deviate from locked ADRs."
    layer: technical
  - key: proof_standard
    content: "Proof standard: raw terminal output + device screenshots only. Agent summaries, fabricated test output, and verbal confirmations of fixes are explicitly rejected. 261/261 must pass after every change. Agent summaries are never accepted as verification of anything."
    layer: technical
  - key: scope_discipline
    content: "Scope ceiling: no features beyond what was asked. No abstractions for single-use code. Surgical changes only — every changed line traces directly to the request. If 200 lines could be 50, rewrite. Touch only what the request requires, clean up only your own mess."
    layer: technical
  - key: never_suggest_these
    content: "NEVER suggest: git checkout main (Robert controls main), Tower deploy (shelved until he says go), merging to main without explicit approval. These have been stated more than 5 times. Violations cause immediate frustration and loss of trust."
    layer: technical
  - key: default_model
    content: DeepSeek V4 Flash (free) as default. DeepSeek Chat for /think. Claude Sonnet for /claude.
    layer: technical
  - key: coding_agents
    content: Antigravity (Windsurf+Gemini) for code. Claude for architecture and design.
    layer: technical
