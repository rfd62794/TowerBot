triggers:
  useless_fact:
    phrases: [random fact, interesting fact, tell me a fact, fact of the day, useless fact, random trivia]
  number_fact:
    phrases: [fact about number, number fact, date fact, math fact, year fact, trivia about]
  random_quote:
    phrases: [random quote, quote of the day, inspirational quote, tell me a quote, famous quote]
  wiki_random:
    phrases: [random wikipedia, random article, wikipedia random, random wiki, surprise me]
  spacex_latest_launch:
    phrases: [spacex launch, rocket launch, latest launch, space launch, spacex]
  jina_read:
    phrases: [read url, read article, extract content, summarize url, fetch content]
  country_info:
    phrases: [country info, about country, country data, tell me about, country details]
  cratesio_info:
    phrases: [rust crate, crates.io, crate info, rust package, crate details]
  hackernews_search:
    phrases: [hacker news, hn search, search hn, hn stories, tech news]
  usgs_earthquake:
    phrases: [earthquake, recent earthquakes, quake, seismic, tremor]
  iss_location:
    phrases: [iss location, space station, where is iss, iss position, international space station]
  open_library_search:
    phrases: [search books, book search, find book, open library, library search]
  boardgame_search:
    phrases: [board game, boardgame, bgg, board game search, find board game]
  lichess_user:
    phrases: [lichess, chess rating, lichess user, chess player, lichess profile]
  search_tools:
    phrases: [search tools, find tools, tool discovery, mcp tools, a2a search]
  register_tool_from_spec:
    phrases: [register tool, add tool from spec, openapi spec, tool registration]
  list_experimental_tools:
    phrases: [list tools, experimental tools, tool list, show tools]
  promote_tool:
    phrases: [promote tool, approve tool, tool promotion]
  list_all_tools:
    phrases: [list all tools, tool catalog, browse tools, show all tools]
  get_tool_info:
    phrases: [tool info, tool details, get tool information]

routes:
  chat:
    model: ollama/gemma3:4b
    tools: []
    description: "General conversation, greetings, simple questions requiring no data"

  calendar:
    model: openrouter/free
    tools:
      - get_today_schedule
      - get_upcoming_events
      - check_availability
      - save_commitment
      - add_personal_task
      - list_personal_tasks
      - complete_personal_task
      - snooze_personal_task
      - delete_personal_task
    description: "Schedule, events, availability, commitments, personal task management"

  email:
    model: openrouter/free
    tools:
      - get_inbox_summary
      - search_email
      - check_sender
      - check_sender_all
      - read_email
    description: "Inbox, messages, email search"

  voidrift:
    model: openrouter/free
    tools:
      - get_itch_stats
      - reddit_search
      - get_recent_commits
      - get_content_recommendations
    description: "VoidDrift game stats, Reddit mentions, commits, content"

  youtube:
    model: openrouter/free
    tools:
      - get_youtube_stats
      - get_top_videos
      - get_video_analytics
      - get_retention_curve
      - get_daily_views
      - get_audience_demographics
      - get_traffic_sources
      - get_device_breakdown
      - get_geographic_breakdown
    description: "YouTube channel stats, video performance, analytics"

  goals:
    model: openrouter/free
    tools:
      - get_goals
      - get_goal
      - get_current_plan
      - get_tasks_today
      - add_task
      - update_task
      - get_upcoming_tasks
      - suggest_goal_progress
      - list_google_tasks
      - get_google_task
      - create_google_task
      - update_google_task
      - complete_google_task
      - delete_google_task
      - sync_google_tasks
    description: "Goals, tasks, milestones, weekly planning, Google Tasks sync"

  memory:
    model: openrouter/free
    tools:
      - save_memory
      - get_memories
      - update_memory
      - retire_memory
    description: "Save or retrieve memories and personal context"

  code:
    model: ollama/qwen2.5-coder:7b
    tools:
      - read_local_file
      - list_local_dir
      - search_local_code
      - audit_repo_compliance
      - analyze_code_quality
      - analyze_dependencies
      - analyze_documentation_alignment
      - inspect_repo
      - generate_strategic_analysis
      - find_opportunities
      - elaborate_task
      - read_current_state
      - generate_directive
    description: "Code analysis, repo inspection, directive generation"

  search:
    model: openrouter/free
    tools:
      - web_search
      - wiki_lookup
      - wiki_random
      - news_search
      - fetch_url
      - jina_read
      - country_info
      - cratesio_info
      - hackernews_search
      - usgs_earthquake
      - iss_location
      - open_library_search
      - boardgame_search
      - lichess_user
      - useless_fact
      - number_fact
      - random_quote
      - spacex_latest_launch
    description: "Web search, Wikipedia, news, URL fetch, Jina Reader, country data, crates.io, Hacker News, earthquakes, ISS, Open Library, BoardGameGeek, Lichess, random facts, quotes, SpaceX"

  steam:
    model: openrouter/free
    tools:
      - get_game_metrics
      - get_installed_games
      - get_sale_info
    description: "Steam games, pricing, metrics"

  openagent:
    model: openrouter/free
    tools:
      - get_pypi_stats
      - run_openagent
    description: "OpenAgent PyPI stats and directive generation"

  think:
    model: claude
    tools: []
    description: "Complex reasoning, architecture planning, multi-step analysis"

  weather:
    model: openrouter/free
    tools:
      - get_weather
      - get_weather_forecast
    description: "Current conditions and forecast"

  blog:
    model: openrouter/free
    tools:
      - get_blog_posts
      - get_blog_post
      - create_blog_draft
      - update_blog_post
      - advance_post_pipeline
      - get_post_pipeline_state
      - create_draft_from_pipeline
      - get_pages
      - get_page
      - update_page
      - create_page
      - delete_page
    description: "Blog posts, drafts, publishing"

  utility:
    model: openrouter/free
    tools:
      - think
      - get_current_datetime
      - calculate
    description: "Cross-cutting utilities — math, time, deep thinking tool"

  system:
    model: openrouter/free
    tools:
      - get_system_resources
      - get_ollama_loaded
      - get_ollama_model_sizes
      - get_privybot_memory
      - get_daily_cost
      - get_chains
      - get_chain
      - get_chain_payload
      - start_chain
      - cancel_chain
      - resume_chain
      - list_templates
      - get_template
      - write_template
      - delete_experimental_template
      - list_memories
      - delete_memory
      - get_promotion_candidates
      - query_db
      - a2a_search
      - register_tool_from_spec
      - list_experimental_tools
      - promote_tool
      - search_tools
      - list_all_tools
      - get_tool_info
    description: "System resources, Ollama status, budget tracking, director access, tool discovery"

  tasks:
    model: openrouter/free
    tools:
      - queue_task
      - get_task_result
      - list_pending_tasks
      - cancel_task
      - purge_null_tasks
      - get_logs
      - run_diagnostic
      - sync_db_export
      - sync_db_import
      - sync_db_status
    description: "Task queue management, DB sync operations, admin diagnostics"

  wordpress:
    model: openrouter/free
    tools:
      - schedule_blog_post
      - search_blog_posts
      - set_post_categories
      - set_post_excerpt
      - set_post_tags
      - get_blog_categories
    description: "WordPress post scheduling, search, and taxonomy"
